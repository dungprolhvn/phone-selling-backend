spring:
  application:
    name: phone
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  datasource:
    url: ${PHONE_DB_URL} # update to ssl later to secure
    username: ${PHONE_DB_USERNAME}
    password: ${PHONE_DB_REDIS_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${PHONE_REDIS_URL}
      port: 6379
      password: ${PHONE_DB_REDIS_PASSWORD}
  elasticsearch:
    uris: ${ES_URL}
    username: ${ES_USERNAME}
    password: ${ES_PASSWORD}
    ssl:
      truststore-location: classpath:ssl/es-truststore.jks
      truststore-password: ${ES_TRUSTSTORE_PASSWORD}

logging:
  level:
    org.springframework.security: DEBUG

app:
  jwt:
    secret: ${PHONE_JWT_SECRET}
    expiration: 86400000
